name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift-Version
        run: swift --version
      - name: Tests
        run: swift test
      - name: Release-Build
        run: swift build -c release
